<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartão Digital - StartPC</title>
    <style>
        :root {
            --bg-page: #060D1A; /* Fundo escuro atrás do cartão */
            --bg-card: #0A192F; /* Fundo do cartão baseado no logo */
            --accent: #00D2FF;  /* Ciano brilhante do botão power */
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Estrutura do Cartão */
        .digital-card {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 210, 255, 0.1);
            border: 1px solid rgba(0, 210, 255, 0.15);
        }

        /* Logótipo */
        .logo-container {
            margin-bottom: 25px;
        }

        .logo-container img {
            width: 180px;
            height: auto;
            border-radius: 10px;
            /* Pequeno brilho em torno da imagem para fundir com o fundo */
            filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.2)); 
        }

        /* Informações Pessoais / Empresa */
        .profile-name {
            color: var(--text-main);
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .profile-title {
            color: var(--accent);
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Botões de Contacto */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        /* Efeito Hover nos botões */
        .btn-link:hover {
            background-color: rgba(0, 210, 255, 0.1);
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.2);
        }

        /* Ícones SVG embutidos */
        .btn-link svg {
            width: 22px;
            height: 22px;
            fill: var(--accent);
        }

        /* Rodapé do Cartão */
        .card-footer {
            margin-top: 35px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
